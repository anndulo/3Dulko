<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>3Dulko Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CesiumJS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/cesium/Build/Cesium/Widgets/widgets.css" />
  <style>
    html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; background:#000; overflow:hidden; }
    .info { position:absolute; top:10px; left:10px; z-index:10; background:rgba(0,0,0,.6); color:#fff; padding:6px 10px; border-radius:4px; font:13px system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div class="info">Left-click: rotate • Right-click: tilt • Scroll: zoom</div>

  <!-- Modern ES module script -->
  <script type="module">
    import * as Cesium from "https://unpkg.com/cesium/Build/Cesium/Cesium.js";

    // >>> Replace with your NEW domain-restricted Cesium ion token (scope: assets:read)
    const ACCESS_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5NDMzNGQwNy1jNDc4LTQ5OTktYWI2MS1kYmI2ZGQ0Nzg3NTQiLCJpZCI6MzczMzEyLCJpYXQiOjE3Njk2MjM1MjR9.CoDeijsMOZvm2pd3dUbeVR1Qy-9_iAET1whJqfQ3GBU";
    const ASSET_ID = 4395595; // your tileset

    // Optional default
    Cesium.Ion.defaultAccessToken = ACCESS_TOKEN;

    // Create the viewer
    const viewer = new Cesium.Viewer("cesiumContainer", {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      imageryProvider: new Cesium.IonImageryProvider({ assetId: 2 }),
      timeline: false,
      animation: false,
      baseLayerPicker: true,
      sceneModePicker: true,
      geocoder: false,
      navigationHelpButton: false
    });

    // Robust load: explicitly resolve ion resource with token, then load
    const resource = await Cesium.IonResource.fromAssetId(ASSET_ID, { accessToken: ACCESS_TOKEN });
    const tileset = await Cesium.Cesium3DTileset.fromUrl(resource);
    viewer.scene.primitives.add(tileset);
    await tileset.readyPromise;
    viewer.flyTo(tileset, { duration: 2.0 });

    // Optional lighting for photogrammetry
    viewer.scene.light = new Cesium.DirectionalLight({
      direction: new Cesium.Cartesian3(0.3, 0.5, -0.8)
    });
  </script>
</body>
</html>
